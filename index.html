<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Assign Books — BPUTNotes</title>
<meta name="robots" content="noindex,nofollow" />
<style>
  :root{
    --blue:#2563eb; --blue-dark:#1e4fa0; --amber:#f59e0b;
    --bg:#f8fafc; --card:#ffffff; --border:#e2e8f0;
    --text:#0f172a; --text-dim:#475569; --text-mute:#94a3b8;
    --green:#16a34a; --red:#dc2626;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased;
  }
  .wrap{ max-width:640px; margin:0 auto; padding:16px; padding-bottom:80px; }

  /* ── Login ── */
  #login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .login-card{
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    padding:28px 24px; width:100%; max-width:360px; box-shadow:0 4px 20px rgba(0,0,0,0.06);
  }
  .login-card h1{ font-size:1.25rem; margin:0 0 4px; }
  .login-card p{ font-size:0.85rem; color:var(--text-mute); margin:0 0 20px; }
  label{ display:block; font-size:0.78rem; font-weight:600; color:var(--text-dim); margin:14px 0 6px; }
  input, select, textarea{
    width:100%; padding:11px 12px; border:1px solid var(--border); border-radius:9px;
    font-size:0.95rem; background:#fff; color:var(--text); font-family:inherit;
  }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--blue); outline-offset:1px; }
  button{
    font-family:inherit; cursor:pointer; border:none; border-radius:9px; font-weight:700;
  }
  .btn-primary{
    width:100%; background:var(--blue); color:#fff; padding:12px; font-size:0.95rem; margin-top:18px;
  }
  .btn-primary:active{ background:var(--blue-dark); }
  .btn-primary:disabled{ opacity:0.6; }
  .err-msg{
    background:rgba(220,38,38,0.08); color:var(--red); border:1px solid rgba(220,38,38,0.2);
    border-radius:8px; padding:9px 12px; font-size:0.82rem; margin-top:12px; display:none;
  }

  /* ── App shell ── */
  #app{ display:none; }
  .topbar{
    position:sticky; top:0; background:var(--card); border-bottom:1px solid var(--border);
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between; z-index:10;
  }
  .topbar .who{ font-size:0.82rem; }
  .topbar .who b{ display:block; font-size:0.95rem; }
  .topbar .who span{ color:var(--text-mute); font-size:0.72rem; }
  .btn-small{
    background:var(--bg); border:1px solid var(--border); color:var(--text-dim);
    padding:8px 12px; font-size:0.78rem; border-radius:8px;
  }
  .actions-row{ display:flex; gap:8px; padding:14px 0 8px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
  .count-pill{ font-size:0.78rem; color:var(--text-dim); background:var(--card); border:1px solid var(--border); padding:5px 10px; border-radius:100px; }

  /* ── Submission cards ── */
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; margin-bottom:12px;
  }
  .card-top{ display:flex; justify-content:space-between; gap:8px; margin-bottom:6px; }
  .book-title{ font-weight:700; font-size:0.95rem; line-height:1.3; }
  .badge{
    font-size:0.66rem; font-weight:700; padding:2px 8px; border-radius:100px; white-space:nowrap;
    background:rgba(37,99,235,0.1); color:var(--blue); height:fit-content;
  }
  .meta{ font-size:0.78rem; color:var(--text-dim); margin:2px 0; }
  .meta b{ color:var(--text); }
  .note-line{ font-size:0.78rem; color:var(--text-mute); margin-top:4px; font-style:italic; }
  .card a.link-btn{
    display:inline-block; margin-top:8px; font-size:0.78rem; color:var(--blue); text-decoration:none; font-weight:600;
  }

  details{ margin-top:10px; }
  summary{
    list-style:none; cursor:pointer; font-size:0.82rem; font-weight:700; color:var(--blue);
    padding:9px 0; border-top:1px dashed var(--border);
  }
  summary::-webkit-details-marker{ display:none; }
  summary:before{ content:"＋ "; }
  details[open] summary:before{ content:"－ "; }

  .form-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
  .form-grid .full{ grid-column:1/-1; }
  .form-hint{ font-size:0.7rem; color:var(--text-mute); margin-top:4px; }
  .btn-assign{
    width:100%; background:var(--green); color:#fff; padding:11px; font-size:0.88rem; margin-top:14px;
  }
  .btn-assign:disabled{ opacity:0.6; }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--text-mute); }
  .empty-state .e-icon{ font-size:2rem; margin-bottom:8px; }

  /* ── Toasts ── */
  #toast-wrap{ position:fixed; bottom:16px; left:0; right:0; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:100; pointer-events:none; }
  .toast{
    background:#0f172a; color:#fff; padding:10px 16px; border-radius:9px; font-size:0.82rem;
    max-width:90%; box-shadow:0 4px 14px rgba(0,0,0,0.2); animation:fadein 0.2s ease;
  }
  .toast.success{ background:#166534; }
  .toast.error{ background:#7f1d1d; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>📚 Assign Books</h1>
    <p>BPUTNotes intern panel — log in with the account given to you.</p>
    <label for="login-user">Username</label>
    <input id="login-user" type="text" autocomplete="username" />
    <label for="login-pass">Password</label>
    <input id="login-pass" type="password" autocomplete="current-password" />
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Log In</button>
    <div class="err-msg" id="login-error"></div>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app">
  <div class="topbar">
    <div class="who"><b id="who-name">—</b><span id="who-range"></span></div>
    <div style="display:flex; gap:8px;">
      <button class="btn-small" onclick="loadSubmissions()">↻ Refresh</button>
      <button class="btn-small" onclick="doLogout()">Log out</button>
    </div>
  </div>

  <div class="wrap">
    <div class="actions-row">
      <span class="count-pill" id="count-pill">Loading…</span>
    </div>
    <div id="list"></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
/* Standalone — no dependency on the main site repo. Same URL as js/sheets.js's APPS_SCRIPT_URL. */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw_5Jw4WCXqedXslj6MGd_EgRhl75eUMZZQvc8vong9TYkeJg29O5yoKnoRBTsoqLp6VA/exec';

const BRANCHES = [
  { v:'cse',        l:'CSE' },
  { v:'civil',      l:'Civil' },
  { v:'electrical', l:'Electrical' },
  { v:'mechanical', l:'Mechanical' },
  { v:'mining',     l:'Mining' },
  { v:'metallurgy', l:'Metallurgy' },
  { v:'mineral',    l:'Mineral' },
];

let SESSION = null; // { token, name, rowStart, rowEnd }
let SUBMISSIONS = [];

/* ── low-level API call (mirrors the cors/text-plain trick already used in sheets.js) ── */
async function callApi(action, payload) {
  const body = JSON.stringify({ action, ...payload });
  const res = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body,
    mode: 'cors',
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'Request failed');
  return json;
}

/* ── auth ── */
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');
  const btn  = document.getElementById('login-btn');
  err.style.display = 'none';
  if (!user || !pass) { err.textContent = 'Enter username and password'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const res = await callApi('login', { username: user, password: pass });
    SESSION = { token: res.token, name: res.name, rowStart: res.rowStart, rowEnd: res.rowEnd };
    sessionStorage.setItem('bpn_intern_session', JSON.stringify(SESSION));
    enterApp();
  } catch (e) {
    err.textContent = '❌ ' + e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Log In';
  }
}

function doLogout() {
  sessionStorage.removeItem('bpn_intern_session');
  SESSION = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
}

function enterApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('who-name').textContent = '👤 ' + SESSION.name;
  document.getElementById('who-range').textContent = `Rows ${SESSION.rowStart}–${SESSION.rowEnd}`;
  loadSubmissions();
}

/* ── data ── */
async function loadSubmissions() {
  document.getElementById('count-pill').textContent = 'Loading…';
  try {
    const res = await callApi('getSubmissions', { token: SESSION.token });
    SUBMISSIONS = res.rows;
    renderList();
  } catch (e) {
    if (/session expired/i.test(e.message)) {
      showToast('Session expired — please log in again', 'error');
      doLogout();
      return;
    }
    showToast('❌ ' + e.message, 'error');
    document.getElementById('count-pill').textContent = 'Error loading';
  }
}

function renderList() {
  const list = document.getElementById('list');
  document.getElementById('count-pill').textContent = `${SUBMISSIONS.length} unassigned in your range`;

  if (!SUBMISSIONS.length) {
    list.innerHTML = `<div class="empty-state"><div class="e-icon">✅</div><p>Nothing left to assign in your rows.</p></div>`;
    return;
  }

  list.innerHTML = SUBMISSIONS.map(s => cardHtml(s)).join('');
}

function cardHtml(s) {
  const sem = parseInt(s.semester) || 1;
  return `
  <div class="card" id="card-${s.rowIndex}">
    <div class="card-top">
      <div class="book-title">${escapeHtml(s.bookTitle || 'Untitled')}</div>
      <span class="badge">Row ${s.rowIndex}</span>
    </div>
    <div class="meta"><b>${escapeHtml(s.internName||'—')}</b> · ${escapeHtml(s.department||'—')} · Sem ${escapeHtml(String(s.semester||'—'))}</div>
    <div class="meta">Subject: <b>${escapeHtml(s.subject||'—')}</b>${s.sourceType ? ' · '+escapeHtml(s.sourceType) : ''}</div>
    ${s.note ? `<div class="note-line">"${escapeHtml(s.note)}"</div>` : ''}
    ${s.bookLink ? `<a class="link-btn" href="${escapeAttr(s.bookLink)}" target="_blank" rel="noopener">🔗 Open book link</a>` : ''}

    <details>
      <summary>Assign to main site</summary>
      ${assignFormHtml(s)}
    </details>
  </div>`;
}

function assignFormHtml(s) {
  const sem = parseInt(s.semester) || 1;
  const showGroup = sem === 1 || sem === 2;
  return `
  <div class="form-grid">
    <div>
      <label>Semester</label>
      <select id="sem-${s.rowIndex}" onchange="toggleGroup(${s.rowIndex})">
        ${[1,2,3,4,5,6,7,8].map(n=>`<option value="${n}" ${n===sem?'selected':''}>${n}</option>`).join('')}
      </select>
    </div>
    <div>
      <label>Subject #</label>
      <select id="subnum-${s.rowIndex}">
        ${[1,2,3,4,5,6].map(n=>`<option value="${n}">${n}</option>`).join('')}
      </select>
    </div>
    <div class="full" id="branchwrap-${s.rowIndex}">
      <label>Branch / Group</label>
      <select id="branch-${s.rowIndex}">
        ${showGroup ? `
          <optgroup label="Sem 1/2 groups (creates multiple entries)">
            <option value="group:circuit">Circuit — 4 branches (Elec, Civil, Mining, Mech)</option>
            <option value="group:non-circuit">Non-Circuit — 3 branches (CSE, Mineral, Metallurgy)</option>
          </optgroup>` : ''}
        <optgroup label="Single branch">
          ${BRANCHES.map(b=>`<option value="branch:${b.v}">${b.l}</option>`).join('')}
        </optgroup>
      </select>
      <div class="form-hint">${showGroup ? 'Pick a group to auto-create one entry per branch, or pick a single branch.' : 'Pick the branch this subject belongs to.'}</div>
    </div>
    <div class="full">
      <label>Subject Name</label>
      <input id="subname-${s.rowIndex}" type="text" value="${escapeAttr(s.subject||'')}" />
    </div>
    <div class="full">
      <label>Book Name</label>
      <input id="bookname-${s.rowIndex}" type="text" value="${escapeAttr(s.bookTitle||'')}" />
    </div>
    <div class="full">
      <label>Drive Link</label>
      <input id="link-${s.rowIndex}" type="url" value="${escapeAttr(s.bookLink||'')}" />
    </div>
    <div class="full">
      <label>Tags</label>
      <input id="tags-${s.rowIndex}" type="text" value="Book" />
    </div>
  </div>
  <button class="btn-assign" id="submitbtn-${s.rowIndex}" onclick="submitAssign(${s.rowIndex})">✅ Add to Main Site</button>
  `;
}

function toggleGroup(rowIndex) {
  // Rebuild the branch/group dropdown when semester changes (group options only valid for sem 1/2)
  const sem = parseInt(document.getElementById(`sem-${rowIndex}`).value);
  const wrap = document.getElementById(`branchwrap-${rowIndex}`);
  const showGroup = sem === 1 || sem === 2;
  const select = document.getElementById(`branch-${rowIndex}`);
  select.innerHTML = `
    ${showGroup ? `
      <optgroup label="Sem 1/2 groups (creates multiple entries)">
        <option value="group:circuit">Circuit — 4 branches (Elec, Civil, Mining, Mech)</option>
        <option value="group:non-circuit">Non-Circuit — 3 branches (CSE, Mineral, Metallurgy)</option>
      </optgroup>` : ''}
    <optgroup label="Single branch">
      ${BRANCHES.map(b=>`<option value="branch:${b.v}">${b.l}</option>`).join('')}
    </optgroup>`;
}

async function submitAssign(rowIndex) {
  const btn = document.getElementById(`submitbtn-${rowIndex}`);
  const sem = parseInt(document.getElementById(`sem-${rowIndex}`).value);
  const subjectNumber = parseInt(document.getElementById(`subnum-${rowIndex}`).value);
  const branchVal = document.getElementById(`branch-${rowIndex}`).value; // "group:x" or "branch:x"
  const subjectName = document.getElementById(`subname-${rowIndex}`).value.trim();
  const bookName = document.getElementById(`bookname-${rowIndex}`).value.trim();
  const driveLink = document.getElementById(`link-${rowIndex}`).value.trim();
  const tags = document.getElementById(`tags-${rowIndex}`).value.trim() || 'Book';

  if (!subjectName || !bookName) {
    showToast('❌ Subject name and book name are required', 'error');
    return;
  }

  const payload = {
    token: SESSION.token,
    sourceRow: rowIndex,
    semester: sem,
    subjectNumber, subjectName, bookName,
    driveLink: driveLink || '#',
    tags, status: 'active',
  };
  if (branchVal.startsWith('group:')) payload.group = branchVal.split(':')[1];
  else payload.branch = branchVal.split(':')[1];

  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const res = await callApi('assignBook', payload);
    showToast(`✅ Added to ${res.branchesAssigned.length} branch(es): ${res.branchesAssigned.join(', ')}`, 'success');
    if (res.driveWarning) showToast('⚠️ ' + res.driveWarning, 'error');
    SUBMISSIONS = SUBMISSIONS.filter(s => s.rowIndex !== rowIndex);
    renderList();
  } catch (e) {
    showToast('❌ ' + e.message, 'error');
    btn.disabled = false; btn.textContent = '✅ Add to Main Site';
  }
}

/* ── utils ── */
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str) { return escapeHtml(str); }

function showToast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

/* ── resume session on reload ── */
(function init() {
  const raw = sessionStorage.getItem('bpn_intern_session');
  if (raw) {
    try { SESSION = JSON.parse(raw); enterApp(); } catch(e) { /* ignore, show login */ }
  }
})();
</script>
</body>
</html>
